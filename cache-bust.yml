name: Auto Cache-Bust on Deploy

on:
  push:
    branches: [ main ]

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version.json with timestamp
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          echo "{ \"version\": \"$TIMESTAMP\" }" > version.json
          echo "Set version to: $TIMESTAMP"

      - name: Commit and push version.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: auto cache-bust [${{ github.run_number }}]"
          git push
